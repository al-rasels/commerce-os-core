version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: commerceos-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: commerceos
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: commerceos-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
